name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test

  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      # build the app, then drive every view/flow through the real Electron window and fail on a
      # page exception, a real console error, or an interaction failure (ui-smoke.mjs exit code).
      - name: Build
        run: npm run build
      - name: UI smoke
        run: node scripts/ui-smoke.mjs
        env:
          SHOT_DIR: ${{ runner.temp }}\dc-uismoke
      - name: Upload smoke screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-screenshots
          path: ${{ runner.temp }}\dc-uismoke
          if-no-files-found: ignore
